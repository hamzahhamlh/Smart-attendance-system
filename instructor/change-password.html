<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تغيير كلمة المرور - المحاضر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Cairo', sans-serif; }
      .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    
    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
      <a href="profile.html" class="text-xl flex items-center">
        <i class="fas fa-arrow-right"></i> 
				<span class="mr-2">	رجوع </span>
      </a>
      <h1 class="text-lg font-bold">تغيير كلمة المرور</h1>
      <div class="w-6"></div>
    </div>

    <div class="max-w-md mx-auto p-6">
      
      <!-- Instruction Text -->
      <div class="mb-8 text-right">
        <h2 class="text-xl font-bold text-[#1a3a8a] mb-2">تحديث كلمة المرور</h2>
        <p class="text-gray-500 text-sm">يرجى إدخال كلمة المرور الحالية ثم اختيار كلمة مرور جديدة قوية.</p>
      </div>

      <!-- Change Password Form -->
      <div class="bg-white rounded-3xl p-8 card-shadow space-y-6">
        
        <!-- Current Password -->
        <div class="space-y-2">
          <label class="block text-right text-sm font-bold text-[#1a3a8a]">كلمة المرور الحالية</label>
          <div class="relative flex items-center border border-gray-200 bg-gray-50 rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:bg-white">
            <input
              type="password"
              placeholder="••••••••"
              class="w-full px-4 py-4 text-right outline-none bg-transparent placeholder:text-gray-300 text-sm"
            />
            <div class="px-4 text-gray-400">
              <i class="fas fa-lock text-sm"></i>
            </div>
          </div>
        </div>

        <!-- New Password -->
        <div class="space-y-2">
          <label class="block text-right text-sm font-bold text-[#1a3a8a]">كلمة المرور الجديدة</label>
          <div class="relative flex items-center border border-gray-200 bg-gray-50 rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:bg-white">
            <input
              type="password"
              placeholder="••••••••"
              class="w-full px-4 py-4 text-right outline-none bg-transparent placeholder:text-gray-300 text-sm"
            />
            <div class="px-4 text-gray-400">
              <i class="fas fa-key text-sm"></i>
            </div>
          </div>
          <p class="text-[10px] text-gray-400 text-right pr-2">يجب أن تحتوي على 8 أحرف على الأقل</p>
        </div>

        <!-- Confirm New Password -->
        <div class="space-y-2">
          <label class="block text-right text-sm font-bold text-[#1a3a8a]">تأكيد كلمة المرور الجديدة</label>
          <div class="relative flex items-center border border-gray-200 bg-gray-50 rounded-2xl overflow-hidden transition-all focus-within:border-[#1a3a8a] focus-within:bg-white">
            <input
              type="password"
              placeholder="••••••••"
              class="w-full px-4 py-4 text-right outline-none bg-transparent placeholder:text-gray-300 text-sm"
            />
            <div class="px-4 text-gray-400">
              <i class="fas fa-check-double text-sm"></i>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button class="w-full bg-[#1a3a8a] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-[#142d6b] transition-all duration-300 mt-4">
          حفظ التغييرات
        </button>

      </div>

      <!-- Security Tips -->
      <div class="mt-8 bg-blue-50 rounded-2xl p-4 border border-blue-100 flex items-start space-x-3 space-x-reverse">
        <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-blue-500 shadow-sm shrink-0">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div class="text-right">
          <h4 class="text-sm font-bold text-blue-800">نصيحة أمنية</h4>
          <p class="text-xs text-blue-600 leading-relaxed mt-1">تأكد من عدم مشاركة كلمة المرور الخاصة بك مع أي شخص، واستخدم مزيجاً من الحروف والأرقام والرموز.</p>
        </div>
      </div>

    </div>

  </body>
</html>
