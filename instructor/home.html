<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم - المحاضر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Cairo', sans-serif; }
      .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen p-6">
    
    <div class="max-w-md mx-auto">
      
  	<!-- Header Section -->
		<div class="flex items-center justify-between mb-8">

			<div class="text-right">
				<h1 class="text-2xl font-bold text-[#1a3a8a]">نظام الحضور الذكي</h1>
				<p class="text-gray-500 text-xs">جامعة الأمير سطام بن عبدالعزيز</p>
			</div>
			<a href="profile.html"
				class="w-12 h-12 bg-[#1a3a8a] rounded-full flex items-center justify-center text-white shadow-md">
				<i class="fas fa-user text-xl"></i>
			</a>
		</div>

		<!-- Location Status Bar -->
		<div class="bg-[#e8f5f1] rounded-2xl p-4 mb-10 flex items-center justify-between border border-[#d1e9e2]">
			<div class="flex items-center gap-4">
				<div class="w-10 h-10 bg-[#d1e9e2] rounded-xl flex items-center justify-center text-[#2d9d78]">
					<i class="fas fa-map-marker-alt"></i>
				</div>
				<div class="text-right">
					<h3 class="text-[#2d9d78] font-bold text-sm">موقعك مؤكد</h3>
					<p class="text-[#2d9d78] text-xs opacity-80">أنت داخل الحرم الجامعي</p>
				</div>
			</div>
			<button class="text-[#2d9d78] hover:rotate-180 transition-transform duration-500">
				<i class="fas fa-sync-alt"></i>
			</button>
		</div>

      <!-- Greeting Section -->
      <div class="mb-10 text-right">
        <h2 class="text-3xl font-bold text-[#1a3a8a] mb-1">مرحباً د. فهد العتيبي</h2>
        <p class="text-gray-400 text-sm">ماذا تريد أن تفعل اليوم؟</p>
      </div>

      <!-- Action Cards Grid -->
      <div class="grid grid-cols-2 gap-4 mb-10">
        
        <!-- Create QR Card -->
        <a href="create-qr.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-[#f0fdf4] rounded-xl flex items-center justify-center text-[#22c55e] mb-4">
            <i class="fas fa-qrcode text-2xl"></i>
          </div>
          <h4 class="font-bold text-[#1a3a8a] text-sm">إنشاء رمز QR</h4>
          <p class="text-gray-400 text-[10px]">إنشاء رمز QR</p>
        </a>

        <!-- Attendance Report Card -->
        <a href="report.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-[#eff6ff] rounded-xl flex items-center justify-center text-[#1a3a8a] mb-4">
            <i class="fas fa-chart-bar text-2xl"></i>
          </div>
          <h4 class="font-bold text-[#1a3a8a] text-sm">تقرير الحضور</h4>
          <p class="text-gray-400 text-[10px]">تقارير الحضور</p>
        </a>

        <!-- Courses Card -->
        <a href="courses.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-[#eff6ff] rounded-xl flex items-center justify-center text-[#3b82f6] mb-4">
            <i class="fas fa-book text-2xl"></i>
          </div>
          <h4 class="font-bold text-[#1a3a8a] text-sm">المقررات</h4>
          <p class="text-gray-400 text-[10px]">مقرراتي</p>
        </a>

        <!-- Settings Card -->
        <a href="profile.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
          <div class="w-12 h-12 bg-[#f8fafc] rounded-xl flex items-center justify-center text-gray-500 mb-4">
            <i class="fas fa-cog text-2xl"></i>
          </div>
          <h4 class="font-bold text-[#1a3a8a] text-sm">الإعدادات</h4>
          <p class="text-gray-400 text-[10px]">الإعدادات</p>
        </a>

      </div>

    </div>

  </body>
</html>
