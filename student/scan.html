<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مسح رمز الاستجابة السريعة - نظام الحضور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Cairo', sans-serif; }
      .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
      .camera-view { background-color: #000; border-radius: 2rem; width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; }
      .camera-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 2px solid #1a3a8a; border-radius: 2rem; pointer-events: none; }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    
    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
      <a href="home.html" class="text-xl">
        <i class="fas fa-arrow-right"></i>
      </a>
      <h1 class="text-lg font-bold truncate max-w-[200px]">مسح رمز الاستجابة السري...</h1>
      <div class="flex items-center space-x-4 space-x-reverse">
        <button id="toggleManual" class="text-xl hover:text-blue-200 transition-colors">
          <i class="fas fa-keyboard"></i>
        </button>
        <button id="toggleCamera" class="text-xl hover:text-blue-200 transition-colors">
          <i class="fas fa-camera"></i>
        </button>
      </div>
    </div>

    <div class="max-w-md mx-auto p-6 space-y-8">
      
      <!-- Location Success Message -->
      <div class="bg-[#e8f5f1] rounded-2xl p-4 flex items-center justify-start border border-[#d1e9e2] text-[#2d9d78]">
        <i class="far fa-check-circle text-2xl"></i>
        <div class="text-right mr-4">
          <h3 class="font-bold text-sm">تم التحقق من الموقع بنجاح</h3>
          <p class="text-xs opacity-80">أنت داخل الحرم الجامعي</p>
        </div>
      </div>

      <!-- Camera View (Default) -->
      <div id="cameraSection" class="space-y-8">
        <div class="camera-view shadow-xl">
          <div class="camera-overlay"></div>
          <!-- Simulated camera feed -->
          <div class="absolute inset-0 flex items-center justify-center text-white/20">
            <i class="fas fa-qrcode text-9xl"></i>
          </div>
        </div>
      </div>

      <!-- Manual Entry Section (Hidden by default) -->
      <div id="manualSection" class="hidden space-y-6">
        <div class="space-y-2">
          <label class="block text-right text-sm font-bold text-[#1a3a8a]">رمز QR</label>
          <textarea 
            placeholder="أدخل رمز QR يدوياً" 
            class="w-full h-32 p-4 bg-white border border-gray-200 rounded-2xl text-right outline-none focus:border-[#1a3a8a] transition-colors resize-none"
          ></textarea>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="space-y-4">
        <button class="w-full bg-gray-200 text-gray-400 font-bold py-4 rounded-2xl cursor-not-allowed">
          تسجيل الحضور
        </button>
        <button class="w-full border-2 border-[#1a3a8a] text-[#1a3a8a] font-bold py-4 rounded-2xl hover:bg-[#1a3a8a]/5 transition-colors">
          استخدام رمز تجريبي
        </button>
      </div>

    </div>

    <script>
      const cameraSection = document.getElementById('cameraSection');
      const manualSection = document.getElementById('manualSection');
      const toggleManual = document.getElementById('toggleManual');
      const toggleCamera = document.getElementById('toggleCamera');

      toggleManual.addEventListener('click', () => {
        cameraSection.classList.add('hidden');
        manualSection.classList.remove('hidden');
      });

      toggleCamera.addEventListener('click', () => {
        manualSection.classList.add('hidden');
        cameraSection.classList.remove('hidden');
      });
    </script>

  </body>
</html>
