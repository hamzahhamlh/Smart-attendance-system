<!doctype html>
<html lang="ar" dir="rtl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>الرئيسية - نظام الحضور الذكي</title>

	<!-- Tailwind CSS CDN -->
	<script src="https://cdn.tailwindcss.com"></script>

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

	<!-- Google Fonts: Cairo -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

	<!-- Supabase JS -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<style>
		body {
			font-family: 'Cairo', sans-serif;
		}
		.card-shadow {
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen p-6">

	<div class="max-w-md mx-auto">

		<!-- Header Section -->
		<div class="flex items-center justify-between mb-8">
			<div class="flex items-center gap-3">
				<!-- Logout Button -->
				<button id="logoutBtn" class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center text-white shadow-md hover:bg-red-600 transition">
					<i class="fas fa-sign-out-alt text-lg"></i>
				</button>
				<!-- Profile Icon -->
				<a href="profile.html" class="w-12 h-12 bg-[#1a3a8a] rounded-full flex items-center justify-center text-white shadow-md">
					<i class="fas fa-user text-xl"></i>
				</a>
			</div>
			<div class="text-right">
				<h1 class="text-2xl font-bold text-[#1a3a8a]">نظام الحضور الذكي</h1>
				<p class="text-gray-500 text-xs">جامعة الأمير سطام بن عبدالعزيز</p>
			</div>
		</div>

		<!-- Location Status Bar -->
		<div class="bg-[#e8f5f1] rounded-2xl p-4 mb-10 flex items-center justify-between border border-[#d1e9e2]">
			<div class="flex items-center gap-4">
				<div class="w-10 h-10 bg-[#d1e9e2] rounded-xl flex items-center justify-center text-[#2d9d78]">
					<i class="fas fa-map-marker-alt"></i>
				</div>
				<div class="text-right">
					<h3 class="text-[#2d9d78] font-bold text-sm">موقعك مؤكد</h3>
					<p class="text-[#2d9d78] text-xs opacity-80">أنت داخل الحرم الجامعي</p>
				</div>
			</div>
			<button id="refreshLocation" class="text-[#2d9d78] hover:rotate-180 transition-transform duration-500">
				<i class="fas fa-sync-alt"></i>
			</button>
		</div>

		<!-- Greeting Section -->
		<div class="mb-10 text-right">
			<h2 id="greetingName" class="text-3xl font-bold text-[#1a3a8a] mb-1">مرحباً أحمد محمد</h2>
			<p class="text-gray-400 text-sm">ماذا تريد أن تفعل اليوم؟</p>
		</div>

		<!-- Action Cards Grid -->
		<div class="grid grid-cols-2 gap-4 mb-10">
			<!-- Scan QR Card -->
			<a href="scan.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
				<div class="w-12 h-12 bg-[#f0fdf4] rounded-xl flex items-center justify-center text-[#22c55e] mb-4">
					<i class="fas fa-qrcode text-2xl"></i>
				</div>
				<h4 class="font-bold text-[#1a3a8a] text-sm">مسح رمز QR</h4>
				<p class="text-gray-400 text-[10px]">سجل حضورك</p>
			</a>
			<!-- My Attendance Card -->
			<a href="attendance.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
				<div class="w-12 h-12 bg-[#eff6ff] rounded-xl flex items-center justify-center text-[#3b82f6] mb-4">
					<i class="fas fa-clipboard-check text-2xl"></i>
				</div>
				<h4 class="font-bold text-[#1a3a8a] text-sm">حضوري</h4>
				<p class="text-gray-400 text-[10px]">سجل الحضور</p>
			</a>
			<!-- Courses Card -->
			<a href="courses.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
				<div class="w-12 h-12 bg-[#eff6ff] rounded-xl flex items-center justify-center text-[#3b82f6] mb-4">
					<i class="fas fa-book text-2xl"></i>
				</div>
				<h4 class="font-bold text-[#1a3a8a] text-sm">المقررات</h4>
				<p class="text-gray-400 text-[10px]">مقرراتي</p>
			</a>
			<!-- Settings Card -->
			<a href="profile.html" class="bg-white p-6 rounded-3xl flex flex-col items-center text-center card-shadow hover:scale-[1.02] transition-transform cursor-pointer">
				<div class="w-12 h-12 bg-[#f8fafc] rounded-xl flex items-center justify-center text-gray-500 mb-4">
					<i class="fas fa-cog text-2xl"></i>
				</div>
				<h4 class="font-bold text-[#1a3a8a] text-sm">الإعدادات</h4>
				<p class="text-gray-400 text-[10px]">الإعدادات</p>
			</a>
		</div>

		<!-- Quick Stats Section -->
		<div class="bg-white rounded-3xl p-6 card-shadow">
			<h3 class="text-lg font-bold text-[#1a3a8a] mb-6 text-right">إحصائيات سريعة</h3>
			<div class="flex justify-around items-center">
				<div class="flex flex-col items-center">
					<div id="presentCount" class="w-12 h-12 bg-[#f0fdf4] rounded-full flex items-center justify-center text-[#22c55e] font-bold mb-2">0</div>
					<span class="text-[10px] text-gray-400">حاضر</span>
				</div>
				<div class="flex flex-col items-center">
					<div id="attendancePercent" class="w-16 h-16 bg-[#eff6ff] rounded-full flex items-center justify-center text-[#3b82f6] font-bold text-lg mb-2">0%</div>
					<span class="text-[10px] text-gray-400">النسبة</span>
				</div>
				<div class="flex flex-col items-center">
					<div id="absentCount" class="w-12 h-12 bg-[#fef2f2] rounded-full flex items-center justify-center text-[#ef4444] font-bold mb-2">0</div>
					<span class="text-[10px] text-gray-400">غائب</span>
				</div>
			</div>
		</div>

	</div>

	<script src="../src/config.js"></script>
	<script>
		const { createClient } = supabase;
		const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

		let currentStudent = null;

		// التحقق من الجلسة
		function checkAuth() {
			const userData = sessionStorage.getItem('user');
			const userType = sessionStorage.getItem('userType');

			if (!userData || userType !== 'student') {
				window.location.href = 'index.html';
				return;
			}

			try {
				currentStudent = JSON.parse(userData);
				updateUI();
				loadStats();
			} catch (e) {
				window.location.href = 'index.html';
			}
		}

		// تحديث واجهة المستخدم بالاسم
		function updateUI() {
			if (currentStudent) {
				document.getElementById('greetingName').textContent = `مرحباً ${currentStudent.name || 'طالب'}`;
			}
		}

		// جلب الإحصائيات
		async function loadStats() {
			if (!currentStudent) return;

			try {
				// عدد مرات الحضور
				const { count: presentCount, error: presentError } = await supabaseClient
					.from('attendance')
					.select('*', { count: 'exact', head: true })
					.eq('student_id', currentStudent.id);

				if (presentError) throw presentError;

				// إجمالي المحاضرات (مثال: افترض أن الطالب مسجل في 3 مواد كل مادة 4 محاضرات = 12)
				// يمكنك تعديل هذا المنطق لاحقاً حسب هيكل نظامك (جدول enrollments مثلاً)
				const TOTAL_LECTURES = 12; // هذا افتراضي، استبدله بمنطق حقيقي
				const present = presentCount || 0;
				const absent = Math.max(TOTAL_LECTURES - present, 0);
				const percentage = TOTAL_LECTURES > 0 ? ((present / TOTAL_LECTURES) * 100).toFixed(1) : 0;

				document.getElementById('presentCount').textContent = present;
				document.getElementById('absentCount').textContent = absent;
				document.getElementById('attendancePercent').textContent = `${percentage}%`;
			} catch (error) {
				console.error('Error loading stats:', error);
			}
		}

		// تحديث الموقع (وهمي حالياً)
		document.getElementById('refreshLocation').addEventListener('click', function() {
			// يمكن إضافة منطق حقيقي للتحقق من الموقع لاحقاً
			alert('تم تحديث حالة الموقع');
		});

		// تسجيل الخروج
		document.getElementById('logoutBtn').addEventListener('click', function() {
			sessionStorage.clear();
			window.location.href = 'index.html';
		});

		// بدء التحقق عند تحميل الصفحة
		checkAuth();
	</script>
</body>

</html>
