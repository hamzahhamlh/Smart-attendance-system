<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المقررات - نظام الحضور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Cairo', sans-serif; }
      .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    
    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
      <a href="home.html" class="text-xl">
        <i class="fas fa-arrow-right"></i>
      </a>
      <h1 class="text-lg font-bold">المقررات</h1>
      <div class="w-6"></div>
    </div>

    <div class="max-w-md mx-auto p-6 space-y-6">
      
      <!-- Course Card -->
      <div class="bg-white rounded-3xl p-6 card-shadow flex flex-col space-y-6">
        
        <div class="flex items-start justify-start">
					 <div class="w-12 h-12 bg-[#eff6ff] rounded-xl flex items-center justify-center text-[#3b82f6]">
            <i class="fas fa-book text-2xl"></i>
          </div>

          <div class="text-right mr-4">
            <h2 class="text-xl font-bold text-[#1a3a8a]">هياكل البيانات والخوارزميات</h2>
            <p class="text-gray-400 text-sm">CS301</p>
          </div>
         
        </div>

        <div class="space-y-4">
          <div class="flex items-center justify-start space-x-3 space-x-reverse">
						<i class="fas fa-map-marker-alt text-gray-400"></i>
            <div class="text-right">
              <p class="text-gray-500 text-sm">القاعة: مبنى 15 - قاعة 101</p>
            </div>
          </div>

          <div class="flex items-center justify-start space-x-3 space-x-reverse">
						<i class="far fa-clock text-gray-400"></i>
            <div class="text-right">
              <p class="text-gray-500 text-sm">الجدول: الأحد - الثلاثاء 8:00 صباحاً</p>
            </div>
          </div>

          <div class="flex items-start justify-start space-x-3 space-x-reverse">
						<i class="far fa-file-alt text-gray-400 mt-1"></i>
            <div class="text-right">
              <p class="text-gray-500 text-sm leading-relaxed">الوصف: مقرر متقدم في هياكل البيانات والخوارزميات</p>
            </div>
          </div>
        </div>

      </div>

      <!-- Add more course cards as needed -->

    </div>

  </body>
</html>
