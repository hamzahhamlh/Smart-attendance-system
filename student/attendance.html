<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حضوري - نظام الحضور الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Cairo', sans-serif; }
      .tab-active { border-bottom: 4px solid white; color: white; }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    
    <!-- Navbar -->
    <div class="bg-[#1a3a8a] text-white p-4 flex items-center justify-between sticky top-0 z-10">
      <a href="home.html" class="text-xl">
        <i class="fas fa-arrow-right"></i>
      </a>
      <h1 class="text-lg font-bold">حضوري</h1>
      <div class="w-6"></div>
    </div>

    <!-- Tabs -->
    <div class="bg-[#1a3a8a] text-white/70 flex justify-around items-center pt-2 pb-0">
      <button class="px-6 py-2 tab-active">الكل</button>
      <button class="px-6 py-2">الحاضر</button>
      <button class="px-6 py-2">الغائب</button>
    </div>

    <div class="max-w-md mx-auto p-6 flex flex-col items-center justify-center min-h-[60vh] text-center">
      
      <!-- Empty State -->
      <div class="bg-white rounded-3xl p-12 shadow-sm flex flex-col items-center space-y-6">
        <div class="w-20 h-20 bg-gray-100 rounded-2xl flex items-center justify-center text-gray-400">
          <i class="far fa-clipboard text-4xl"></i>
        </div>
        <div class="space-y-2">
          <h3 class="text-xl font-bold text-gray-500">لا يوجد سجل حضور</h3>
          <p class="text-gray-400 text-sm">ابدأ بتسجيل حضورك باستخدام رمز QR</p>
        </div>
      </div>

    </div>

  </body>
</html>
